    <style>
        :root {
            --color-primary: #1F365C;
            --color-surface: #FFFFFF;
            --color-bg-start: rgba(160, 216, 239, 1);
            --color-bg-end: #FFFFFF;
            
            --shadow-item: 0px 6px 14px -6px rgba(24, 39, 75, 0.12),
                           0px 10px 32px -4px rgba(24, 39, 75, 0.1),
                           inset 0px 0px 2px 1px rgba(24, 39, 75, 0.05);
            
            --transition-smooth: 0.15s cubic-bezier(0.17, 0.67, 0.29, 2.71);
            --transition-fast: 0.1s ease-in-out;
            
            --font-main: 'Inter', sans-serif;
            --container-width: 680px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            overscroll-behavior: none;
            font-family: var(--font-main);
            color: var(--color-primary);
            -webkit-font-smoothing: antialiased;
        }

        .page-background {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: linear-gradient(to right, var(--color-bg-start), var(--color-bg-end));
        }

        .main-container {
            width: 100%;
            max-width: var(--container-width);
            margin: 0 auto;
            padding: 3rem 1.5rem 10rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .profile-avatar {
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 1rem;
        }

        .profile-username {
            font-size: 1.25rem;
            font-weight: 800;
            margin: 0 0 0.25rem 0;
        }

        .profile-name {
            font-size: 1.125rem;
            font-weight: 700;
            margin: 0 0 0.25rem 0;
        }

        .profile-bio {
            font-size: 1rem;
            font-weight: 500;
            margin: 0;
            opacity: 0.9;
        }

        .social-nav {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1.125rem;
            margin-bottom: 2rem;
        }

        .social-link {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-primary);
            transition: transform var(--transition-fast);
            outline: none;
            border-radius: 8px;
        }

        .social-link svg {
            width: 1.75rem;
            height: 1.75rem;
            fill: currentColor;
        }

        .social-link:hover,
        .social-link:focus-visible {
            transform: scale(1.1);
        }

        .social-link:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 4px;
        }

        .links-list {
            list-style: none;
            padding: 0;
            margin: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .link-item {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-surface);
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            min-height: 3.75rem;
            border-radius: 8px;
            box-shadow: var(--shadow-item);
            transition: transform var(--transition-smooth);
            padding: 0.5rem 1rem;
            outline: none;
        }

        .link-item:hover,
        .link-item:focus-visible {
            transform: translateY(-2px) scale(1.015);
        }

        .link-item:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .link-icon {
            position: absolute;
            left: 0.5rem;
            width: 2.75rem;
            height: 2.75rem;
            object-fit: cover;
            border-radius: 6px;
        }

        .link-title {
            text-align: center;
            width: 60%;
            word-break: break-word;
        }
    </style>
